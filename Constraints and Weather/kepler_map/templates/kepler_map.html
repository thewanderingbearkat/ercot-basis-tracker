<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Kepler / deck.gl — Grid Explorer (BETA)</title>
<script src="https://unpkg.com/maplibre-gl@3.6.2/dist/maplibre-gl.js"></script>
<link href="https://unpkg.com/maplibre-gl@3.6.2/dist/maplibre-gl.css" rel="stylesheet">
<script src="https://unpkg.com/deck.gl@8.9.35/dist.min.js"></script>
<style>
  html, body { margin:0; height:100%; background:#0b0e14; color:#e5e7eb;
    font-family:-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; }
  #deckmap { position:fixed; inset:0; }
  .maplibregl-ctrl-attrib { font-size:9px; opacity:.5; }
  #panel { position:fixed; top:14px; left:14px; width:282px; z-index:5;
    background:rgba(17,21,30,.93); border:1px solid #2a3344; border-radius:10px;
    padding:14px 15px; box-shadow:0 8px 30px rgba(0,0,0,.5); backdrop-filter:blur(6px); }
  #panel h1 { font-size:14px; margin:0 0 2px; font-weight:700; letter-spacing:-.01em; }
  #panel .sub { font-size:10px; color:#7c8699; margin-bottom:10px; }
  #panel .sub a, #panel .sub span.lnk { color:#60a5fa; text-decoration:none; cursor:pointer; }
  #search { width:100%; box-sizing:border-box; background:#0d1220; border:1px solid #2a3344;
    border-radius:7px; color:#e5e7eb; font-size:12px; padding:7px 9px; outline:none; }
  #search:focus { border-color:#7c3aed; }
  #searchct { font-size:10px; color:#a78bfa; margin:4px 0 2px; min-height:12px; }
  .lyr { display:flex; align-items:center; gap:9px; padding:8px 0; border-top:1px solid #1f2734; }
  .sw { width:11px; height:11px; border-radius:3px; flex:none; }
  .lyr .nm { font-size:12px; font-weight:600; flex:1; }
  .lyr .ct { font-size:10px; color:#7c8699; font-weight:500; }
  .tog { position:relative; width:32px; height:18px; border-radius:9px; background:#2a3344;
    cursor:pointer; transition:background .15s; flex:none; }
  .tog.on { background:#7c3aed; }
  .tog::after { content:""; position:absolute; top:2px; left:2px; width:14px; height:14px;
    border-radius:50%; background:#fff; transition:transform .15s; }
  .tog.on::after { transform:translateX(14px); }
  .faclegend { font-size:10px; color:#9aa4b5; margin:6px 0 0 20px; display:none; }
  .faclegend.show { display:block; }
  .faclegend i { display:inline-block; width:8px; height:8px; border-radius:50%; margin:0 3px 0 8px; vertical-align:middle; }
  #timebox { margin-top:12px; padding-top:12px; border-top:1px solid #1f2734; display:none; }
  #timebox.show { display:block; }
  .trow { display:flex; align-items:center; gap:8px; }
  #play { width:30px; height:30px; border-radius:7px; border:none; background:#7c3aed; color:#fff; cursor:pointer; font-size:13px; flex:none; }
  #play:hover { background:#8b5cf6; }
  #tslider { flex:1; accent-color:#7c3aed; }
  #tlabel { font-size:11px; color:#cbd5e1; margin-top:6px; font-variant-numeric:tabular-nums; text-align:center; }
  #tlabel b { color:#fff; }
  #nodebox { margin-top:11px; }
  #nodebox .nbh { font-size:10px; text-transform:uppercase; letter-spacing:.04em; color:#7c8699; margin-bottom:5px; }
  .nrow { display:flex; align-items:center; gap:6px; font-size:11.5px; padding:2px 0; }
  .nrow .nlab { flex:1; color:#cbd5e1; }
  .nrow .nval { font-variant-numeric:tabular-nums; font-weight:700; }
  #spark { width:100%; height:42px; display:block; margin-top:8px; background:#0d1220; border-radius:5px; }
  .hint { font-size:10px; color:#6b7280; margin-top:9px; line-height:1.45; border-top:1px solid #1f2734; padding-top:9px; }
  .heat { font-size:10px; color:#94a3b8; margin-top:8px; }
  .heat .bar { display:inline-block; width:84px; height:8px; border-radius:4px; vertical-align:middle; margin:0 5px;
    background:linear-gradient(90deg,#7a3b12,#f59e0b,#fde047,#fff7d6); }
</style>
</head>
<body>
<div id="deckmap"></div>
<div id="panel">
  <h1>Grid Explorer <span style="font-size:9px;color:#a855f7;font-weight:700;vertical-align:super;">BETA</span></h1>
  <div class="sub">deck.gl · <a href="/">← dashboard</a> · <span class="lnk" id="reset">⟲ reset view</span></div>

  <input id="search" placeholder="search facilities by owner…" autocomplete="off">
  <div id="searchct"></div>

  <div class="lyr">
    <span class="sw" style="background:#2563eb;"></span>
    <span class="nm">Transmission <span class="ct" id="ct-arc"></span></span>
    <div class="tog on" id="tog-arc"></div>
  </div>
  <div class="lyr">
    <span class="sw" style="background:#22d3ee;"></span>
    <span class="nm">Facilities <span class="ct" id="ct-fac"></span></span>
    <div class="tog on" id="tog-fac"></div>
  </div>
  <div class="faclegend" id="faclegend">
    <i style="background:#22d3ee;"></i>wind <i style="background:#f59e0b;"></i>solar <i style="background:#e879f9;"></i>data center
    <div style="margin:4px 0 0 8px;color:#7c8699;">size & glow ∝ MW</div>
  </div>
  <div class="lyr">
    <span class="sw" style="background:#fde047;"></span>
    <span class="nm">Congestion <span class="ct" id="ct-cong"></span></span>
    <div class="tog" id="tog-cong"></div>
  </div>

  <div id="timebox">
    <div class="trow"><button id="play">▶</button><input type="range" id="tslider" min="0" max="100" value="0"></div>
    <div id="tlabel">—</div>
    <div id="nodebox">
      <div class="nbh">Congestion push at our nodes ($/MWh)</div>
      <div id="nrows"></div>
      <canvas id="spark" width="250" height="42"></canvas>
    </div>
    <div class="heat">line brightness = shadow price <span class="bar"></span></div>
  </div>

  <div class="hint">drag to pan · <b>right-drag (or ctrl-drag) to spin &amp; tilt</b> · scroll to zoom · zoom in for more lines</div>
</div>

<script>
const COLOR = { 500:[149,97,255], 345:[56,130,255], 230:[34,197,255], lo:[34,211,170] };
function arcColor(v){ const c=v>=500?COLOR[500]:v>=345?COLOR[345]:v>=230?COLOR[230]:COLOR.lo; return [c[0],c[1],c[2],210]; }
const FAC_COLOR = { wind:[34,211,238], solar:[245,158,11], datacenter:[232,121,249] };

let viewState = { longitude:-99.5, latitude:31.6, zoom:5.1, pitch:48, bearing:-12 };
const deckgl = new deck.DeckGL({
  container:"deckmap", map:maplibregl,
  mapStyle:"https://basemaps.cartocdn.com/gl/dark-matter-gl-style/style.json",
  viewState,
  controller:{ dragRotate:true, touchRotate:true, keyboard:true, inertia:320 },
  onViewStateChange: ({viewState:vs}) => { viewState=vs; deckgl.setProps({viewState}); onZoom(vs.zoom); },
});

const state = { arc:true, fac:true, cong:false };
const CONG_WIN = 1500, FEATURED = "NBOHR_RN";
let arcsByKv = {}, loadedKv = 345;
let facilities=null, cong=null, seriesIdx=null, matches=null, searchQ="";
let curT=0, playing=false, raf=null;

const $ = id => document.getElementById(id);
function setTog(k){ $("tog-"+k).classList.toggle("on", state[k]); }
async function getJSON(u){ const r=await fetch(u); if(!r.ok) throw new Error(u+" "+r.status); return r.json(); }

// progressively reveal lower-voltage lines as you zoom in
function tierForZoom(z){ return z>=8 ? 138 : z>=6.5 ? 230 : 345; }
async function loadArcs(minKv){
  if(!arcsByKv[minKv]) arcsByKv[minKv] = await getJSON("/api/kepler/transmission?min_kv="+minKv);
  loadedKv = minKv;
  $("ct-arc").textContent = `${arcsByKv[minKv].length.toLocaleString()} ≥${minKv}kV`;
  render();
}
function onZoom(z){ if(!state.arc) return; const want=tierForZoom(z); if(want!==loadedKv) loadArcs(want); }

async function loadFacilities(){
  if(facilities) return;
  const [gen, dc] = await Promise.all([getJSON("/api/infra/generation"), getJSON("/api/infra/datacenters")]);
  const pts = [];
  for(const f of gen.features){ const p=f.properties||{};
    pts.push({position:f.geometry.coordinates, type:p.source||"solar", name:p.name, operator:p.operator, mw:+p.mw||0}); }
  for(const f of dc.features){ const p=f.properties||{};
    pts.push({position:f.geometry.coordinates, type:"datacenter", name:p.name, operator:p.operator, mw:0}); }
  facilities = pts;
  $("ct-fac").textContent = `${pts.length.toLocaleString()}`;
  render();
}
async function loadCong(){
  if(cong) return;
  $("ct-cong").textContent = "loading…";
  try { cong = await getJSON("/api/kepler/congestion"); }
  catch(e){ $("ct-cong").textContent="failed"; cong={lines:[]}; return; }
  $("ct-cong").textContent = cong.lines.length ? `${cong.lines.length.toLocaleString()} events` : "no data";
  if(cong.t0){
    curT=cong.t0; $("tslider").min=cong.t0; $("tslider").max=cong.t1; $("tslider").step=300; $("tslider").value=cong.t0;
    seriesIdx={}; for(const sp in cong.node_series){ const m={}; for(const e of cong.node_series[sp]) m[e.t]=e.impact; seriesIdx[sp]=m; }
  }
  updateNodeBox(); render();
}

// ---- facility visual encoding: size + glow by MW ----
function facRadius(d){ return 1100 + Math.sqrt(d.mw||14)*430; }     // meters; grows on zoom-in
function facColor(d){ const c=FAC_COLOR[d.type]||[148,163,184];
  const a = d.mw ? Math.min(255, 120+Math.sqrt(d.mw)*10) : 150;
  return [c[0],c[1],c[2],a]; }

function fmtT(epoch){ return new Date(epoch*1000).toLocaleString("en-US",{month:"short",day:"numeric",hour:"2-digit",minute:"2-digit"}); }
function nearestImpact(sp){ const m=seriesIdx&&seriesIdx[sp]; if(!m) return null;
  let t=Math.floor(curT/300)*300; for(let k=0;k<4;k++){ if(m[t]!==undefined) return m[t]; t-=300; } return 0; }
function heat(price){ const m=Math.min(1,Math.abs(price)/120);
  return [255, Math.round(120+m*135), Math.round(20+m*200), Math.round(120+m*135)]; }

function layers(){
  const out = [];
  const arcs = arcsByKv[loadedKv];
  if(state.arc && arcs){
    out.push(new deck.ArcLayer({
      id:"transmission", data:arcs, getHeight:0.4, greatCircle:false,
      getSourcePosition:d=>d.source, getTargetPosition:d=>d.target,
      getSourceColor:d=>arcColor(d.voltage), getTargetColor:d=>arcColor(d.voltage),
      getWidth:d=>d.voltage>=500?4:d.voltage>=345?3:d.voltage>=230?2:1.4,
      widthUnits:"pixels", widthMinPixels:1.6, widthMaxPixels:9, opacity:0.78,
      pickable:true, autoHighlight:true, highlightColor:[255,255,255,200],
    }));
  }
  if(state.fac && facilities){
    out.push(new deck.ScatterplotLayer({
      id:"facilities", data:facilities, getPosition:d=>d.position,
      getFillColor:facColor, getRadius:facRadius,
      radiusUnits:"meters", radiusMinPixels:2, radiusMaxPixels:60,
      opacity:1, pickable:true, stroked:false,
      parameters:{ blend:true, blendFunc:[770,1], blendEquation:32774 },   // additive glow
    }));
  }
  if(matches && matches.length){
    out.push(new deck.ScatterplotLayer({
      id:"search-hi", data:matches, getPosition:d=>d.position,
      getFillColor:[255,255,255,235], getRadius:d=>facRadius(d)*1.5,
      radiusUnits:"meters", radiusMinPixels:5, radiusMaxPixels:90,
      stroked:true, getLineColor:[167,139,250,255], lineWidthMinPixels:2, pickable:true,
    }));
  }
  if(state.cong && cong && cong.lines.length){
    const vis = cong.lines.filter(d => d.t<=curT && d.t>curT-CONG_WIN);
    out.push(new deck.ArcLayer({
      id:"congestion", data:vis, getHeight:0.35, pickable:true, autoHighlight:true,
      getSourcePosition:d=>d.source, getTargetPosition:d=>d.target,
      getSourceColor:d=>heat(d.price), getTargetColor:d=>heat(d.price),
      getWidth:d=>1.6+Math.min(8,Math.abs(d.price)/14), widthMinPixels:1.5,
      updateTriggers:{ getSourceColor:curT, getTargetColor:curT, getWidth:curT },
    }));
  }
  return out;
}
function render(){ deckgl.setProps({ layers:layers(), getTooltip }); }

function getTooltip({object, layer}){
  if(!object) return null;
  if(layer.id==="transmission") return {text:`Transmission · ${object.voltage} kV`};
  if(layer.id==="facilities" || layer.id==="search-hi"){ const d=object;
    let s=`${d.name||d.type}\n${d.type}`; if(d.operator) s+=`\nOwner: ${d.operator}`; if(d.mw) s+=`\n${d.mw.toLocaleString()} MW`;
    return {text:s}; }
  if(layer.id==="congestion"){ const d=object;
    let s=`${d.name}\nShadow price: $${d.price}/MWh\n${fmtT(d.t)}`;
    if(d.node_impact){ s+="\n— pushing our basis —";
      for(const sp in d.node_impact){ const v=d.node_impact[sp]; s+=`\n${shortLab(sp)}: ${v>0?"+":""}${v} (${v<0?"down":"up"})`; } }
    return {text:s}; }
  return null;
}
function shortLab(sp){ const l=cong&&cong.node_labels&&cong.node_labels[sp]; return l?l.split(" / ")[0]:sp; }

// ---- search by owner ----
function fitTo(pts){
  let minx=180,miny=90,maxx=-180,maxy=-90;
  for(const p of pts){ const [x,y]=p.position; minx=Math.min(minx,x);maxx=Math.max(maxx,x);miny=Math.min(miny,y);maxy=Math.max(maxy,y); }
  const span=Math.max(maxx-minx,maxy-miny,0.05);
  const zoom=Math.max(3.2, Math.min(9.5, 8.3 - Math.log2(span)));
  viewState = {...viewState, longitude:(minx+maxx)/2, latitude:(miny+maxy)/2, zoom,
    transitionDuration:850, transitionInterpolator:new deck.FlyToInterpolator()};
  deckgl.setProps({viewState}); onZoom(zoom);
}
function runSearch(){
  searchQ = $("search").value.trim().toLowerCase();
  if(!searchQ){ matches=null; $("searchct").textContent=""; render(); return; }
  if(!facilities){ loadFacilities().then(runSearch); return; }
  matches = facilities.filter(d => (d.operator||"").toLowerCase().includes(searchQ));
  const owners = new Set(matches.map(d=>d.operator));
  $("searchct").textContent = matches.length
    ? `${matches.length.toLocaleString()} sites · ${owners.size} owner${owners.size>1?"s":""}` : "no match";
  if(matches.length) fitTo(matches);
  render();
}
let st; $("search").oninput = ()=>{ clearTimeout(st); st=setTimeout(runSearch, 280); };

// ---- node-impact box ----
function updateNodeBox(){
  if(!cong || !cong.t0) return;
  $("tlabel").innerHTML = `<b>${fmtT(curT)}</b>`;
  const rows=[];
  for(const sp of cong.settlement_points){
    const v=nearestImpact(sp); if(v===null) continue;
    const down=v<0, col=Math.abs(v)<0.05?"#94a3b8":(down?"#f87171":"#4ade80");
    rows.push(`<div class="nrow"><span class="nlab">${shortLab(sp)}</span>`+
      `<span class="nval" style="color:${col}">${v>0?"+":""}${v.toFixed(2)}</span>`+
      `<span style="color:${col};width:12px">${Math.abs(v)<0.05?"·":(down?"▼":"▲")}</span></div>`);
  }
  $("nrows").innerHTML = rows.join(""); drawSpark();
}
function drawSpark(){
  const cv=$("spark"), ctx=cv.getContext("2d"), W=cv.width, H=cv.height; ctx.clearRect(0,0,W,H);
  const ser=cong.node_series[FEATURED]; if(!ser||!ser.length) return;
  const t0=cong.t0,t1=cong.t1,span=Math.max(1,t1-t0); let lo=0,hi=0;
  for(const e of ser){ lo=Math.min(lo,e.impact); hi=Math.max(hi,e.impact); }
  const pad=(hi-lo)*0.1||1; lo-=pad; hi+=pad;
  const x=t=>((t-t0)/span)*W, y=v=>H-((v-lo)/(hi-lo))*H;
  ctx.strokeStyle="#2a3344"; ctx.lineWidth=1; ctx.beginPath(); ctx.moveTo(0,y(0)); ctx.lineTo(W,y(0)); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(x(ser[0].t),y(ser[0].impact));
  for(const e of ser) ctx.lineTo(x(e.t),y(e.impact));
  ctx.lineTo(x(ser[ser.length-1].t),y(0)); ctx.lineTo(x(ser[0].t),y(0)); ctx.closePath();
  ctx.fillStyle="rgba(124,58,237,.25)"; ctx.fill();
  ctx.beginPath(); ctx.moveTo(x(ser[0].t),y(ser[0].impact));
  for(const e of ser) ctx.lineTo(x(e.t),y(e.impact));
  ctx.strokeStyle="#a78bfa"; ctx.lineWidth=1.4; ctx.stroke();
  const px=x(curT); ctx.strokeStyle="#fde047"; ctx.lineWidth=1.5;
  ctx.beginPath(); ctx.moveTo(px,0); ctx.lineTo(px,H); ctx.stroke();
}

// ---- time animation ----
function tick(){ if(!playing) return; curT+=300; if(curT>cong.t1) curT=cong.t0;
  $("tslider").value=curT; updateNodeBox(); render(); raf=setTimeout(()=>requestAnimationFrame(tick),110); }
$("play").onclick = ()=>{ if(!cong||!cong.lines.length) return;
  playing=!playing; $("play").textContent=playing?"❚❚":"▶"; if(playing) tick(); else clearTimeout(raf); };
$("tslider").oninput = e=>{ curT=+e.target.value; updateNodeBox(); render(); };

// ---- toggles + reset ----
$("tog-arc").onclick = ()=>{ state.arc=!state.arc; setTog("arc"); if(state.arc) loadArcs(loadedKv); else render(); };
$("tog-fac").onclick = ()=>{ state.fac=!state.fac; setTog("fac"); $("faclegend").classList.toggle("show",state.fac); if(state.fac) loadFacilities(); else render(); };
$("tog-cong").onclick = ()=>{ state.cong=!state.cong; setTog("cong"); $("timebox").classList.toggle("show",state.cong);
  if(state.cong) loadCong(); else { playing=false; $("play").textContent="▶"; clearTimeout(raf); render(); } };
$("reset").onclick = ()=>{ viewState={longitude:-99.5,latitude:31.6,zoom:5.1,pitch:48,bearing:-12,
  transitionDuration:700,transitionInterpolator:new deck.FlyToInterpolator()}; deckgl.setProps({viewState}); };

// initial
$("faclegend").classList.add("show");
loadArcs(345); loadFacilities();
</script>
</body>
</html>
