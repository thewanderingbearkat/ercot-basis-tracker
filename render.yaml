services:
  - type: web
    name: ercot-basis-tracker
    runtime: python-3.12
    plan: free
    region: oregon

    # Build configuration
    buildCommand: pip install -r requirements.txt
    # IMPORTANT: keep this at --workers 1. Shadow Trader's auto-refresh thread,
    # `_refresh_status` flag, and in-memory cache all live in a single Python
    # process. Running >1 worker means each process has its own refresh thread
    # and they race to write data/raw_cache.json, leaving the dashboard showing
    # inconsistent "Refreshing..." states depending on which worker handled the
    # request. Use --threads to handle concurrent requests instead.
    startCommand: gunicorn -w 1 --threads 4 -b 0.0.0.0:$PORT --timeout 120 app:app

    # Environment variables
    envVars:
      - key: FLASK_ENV
        value: production
      - key: PYTHONUNBUFFERED
        value: "1"
      - key: SECRET_KEY
        sync: false
      - key: DASHBOARD_PASSWORD
        sync: false
      - key: TENASKA_API_USER
        sync: false
      - key: TENASKA_API_PASSWORD
        sync: false
      - key: PHAROS_API_TOKEN
        sync: false
      # Hail Monitor (Vaisala XWeather). Set the actual ID/secret in the Render
      # dashboard -- the /hail tab returns an auth error until both are present.
      - key: XWEATHER_CLIENT_ID
        sync: false
      - key: XWEATHER_CLIENT_SECRET
        sync: false

    # Service details
    healthCheckPath: /api/health

    # Auto-deploy on push
    autoDeploy: true
